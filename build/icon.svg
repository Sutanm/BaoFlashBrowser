<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="128" cy="128" r="128"/>
    </clipPath>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>

  <!-- Outer shadow -->
  <circle cx="128" cy="128" r="124" fill="rgba(0,0,0,0.1)"/>

  <!-- Colored ring segments (Chrome style) -->
  <!-- Red: top -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="#EA4335" stroke-width="32"
    stroke-dasharray="169 509" transform="rotate(-42,128,128)"/>
  <!-- Yellow: right -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="#FBBC04" stroke-width="32"
    stroke-dasharray="169 509" transform="rotate(48,128,128)"/>
  <!-- Green: bottom -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="#34A853" stroke-width="32"
    stroke-dasharray="169 509" transform="rotate(138,128,128)"/>
  <!-- Blue: left -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="#4285F4" stroke-width="32"
    stroke-dasharray="169 509" transform="rotate(228,128,128)"/>

  <!-- Inner light ring separator -->
  <circle cx="128" cy="128" r="93" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Inner dark area with subtle gradient -->
  <circle cx="128" cy="128" r="88" fill="#1a1a2e"/>

  <!-- Center B -->
  <text x="128" y="145" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="100" font-weight="bold" fill="url(#gold-grad)" letter-spacing="-4">B</text>

  <!-- Inner light reflection -->
  <circle cx="128" cy="128" r="84" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>

  <!-- FLASH badge -->
  <g transform="translate(170, 170)">
    <rect x="0" y="0" width="70" height="26" rx="5" fill="#EA4335"/>
    <text x="35" y="18" text-anchor="middle" font-family="Arial, sans-serif"
      font-size="15" font-weight="bold" fill="#ffffff" letter-spacing="1">FLASH</text>
  </g>
</svg>
