<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>

  <!-- Outer shadow -->
  <circle cx="128" cy="128" r="124" fill="rgba(0,0,0,0.15)"/>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>

  <!-- Outer ring (browser frame) -->
  <circle cx="128" cy="128" r="114" fill="none" stroke="url(#ring)" stroke-width="4"/>

  <!-- Network dots around the ring -->
  <circle cx="128" cy="18" r="4" fill="#3498db"/>
  <circle cx="196" cy="45" r="4" fill="#3498db"/>
  <circle cx="235" cy="105" r="4" fill="#3498db"/>
  <circle cx="238" cy="175" r="4" fill="#3498db"/>
  <circle cx="205" cy="228" r="4" fill="#3498db"/>
  <circle cx="128" cy="242" r="4" fill="#3498db"/>
  <circle cx="55" cy="228" r="4" fill="#3498db"/>
  <circle cx="18" cy="175" r="4" fill="#3498db"/>
  <circle cx="16" cy="105" r="4" fill="#3498db"/>
  <circle cx="50" cy="45" r="4" fill="#3498db"/>

  <!-- Inner circle separator -->
  <circle cx="128" cy="128" r="78" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Center B -->
  <text x="128" y="145" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="100" font-weight="bold" fill="#ecf0f1">B</text>

  <!-- FLASH badge -->
  <rect x="78" y="180" width="100" height="28" rx="14" fill="#e74c3c"/>
  <text x="128" y="200" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="17" font-weight="bold" fill="#ffffff" letter-spacing="3">FLASH</text>
</svg>
