<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="32" fill="#2c2c2c"/>

  <!-- Subtle border -->
  <rect x="8" y="8" width="240" height="240" rx="32" fill="none" stroke="#3c3c3c" stroke-width="2"/>

  <!-- FLASH badge at bottom -->
  <rect x="48" y="200" width="160" height="36" rx="6" fill="#e74c3c"/>
  <text x="128" y="225" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="20" font-weight="bold" fill="#ffffff" letter-spacing="4">FLASH</text>

  <!-- Center B -->
  <text x="128" y="145" text-anchor="middle" font-family="Arial, sans-serif"
    font-size="120" font-weight="bold" fill="#ffffff">B</text>
</svg>
