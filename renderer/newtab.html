<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新标签页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100vh;
  background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #222222; user-select: none;
}
.search-box {
  width: 560px; max-width: 90vw; margin-bottom: 40px;
}
.search-box input {
  width: 100%; height: 44px; padding: 0 20px;
  border: 1px solid #cccccc; border-radius: 22px;
  font-size: 16px; outline: none; color: #222; background: #f9f9f9;
}
.search-box input:focus { border-color: #533483; background: #fff; }
.links { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; max-width: 600px; }
.link-card {
  width: 120px; padding: 16px 8px; text-align: center;
  border-radius: 8px; cursor: pointer; transition: background 0.15s;
  text-decoration: none; color: inherit;
}
.link-card:hover { background: #f0f0f0; }
.link-card .icon {
  width: 40px; height: 40px; border-radius: 8px;
  background: #f0f0f0; margin: 0 auto 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.link-card .title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>
<div class="search-box">
  <input type="text" id="search-input" placeholder="搜索或输入网址" autofocus>
</div>
<div class="links" id="links"></div>
<script>
var links = [
  { title: '4399', url: 'https://www.4399.com/', icon: '🎮' },
  { title: '7k7k', url: 'https://www.7k7k.com/', icon: '🕹' },
  { title: 'Bing', url: 'https://www.bing.com/', icon: '🔍' },
  { title: '百度', url: 'https://www.baidu.com/', icon: '🔗' },
  { title: 'GitHub', url: 'https://github.com/', icon: '💻' },
  { title: 'B站', url: 'https://www.bilibili.com/', icon: '📺' }
];

var el = document.getElementById('links');
for (var i = 0; i < links.length; i++) {
  var a = document.createElement('a');
  a.className = 'link-card';
  a.href = links[i].url;
  a.innerHTML = '<div class="icon">' + links[i].icon + '</div><div class="title">' + links[i].title + '</div>';
  a.addEventListener('click', function(e) {
    e.preventDefault();
    window.location.href = this.href;
  });
  el.appendChild(a);
}

document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var val = this.value.trim();
    if (!val) return;
    var url;
    if (val.indexOf('.') !== -1 && val.indexOf(' ') === -1) {
      url = val.indexOf('://') !== -1 ? val : 'https://' + val;
    } else {
      url = 'https://www.bing.com/search?q=' + encodeURIComponent(val);
    }
    window.location.href = url;
  }
});
</script>
</body>
</html>
